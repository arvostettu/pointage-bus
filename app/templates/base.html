<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b5fff" />
    <title>{% block title %}Pointage Bus{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1115;
            --card: #1a1d24;
            --border: #2a2f3a;
            --text: #f4f6fb;
            --muted: #8a93a6;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #16a34a;
            --error: #dc2626;
            --warning: #d97706;
            --aller: #0ea5e9;
            --retour: #8b5cf6;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px;
            min-height: 100vh;
        }
        main {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px 48px;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 4px;
        }
        .muted { color: var(--muted); }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        input[type="number"], input[type="password"] {
            width: 100%;
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            padding: 16px;
            outline: none;
        }
        input[type="password"] {
            font-size: 24px;
            font-weight: 500;
        }
        input:focus {
            border-color: var(--primary);
        }
        button, .btn {
            display: block;
            width: 100%;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: background 0.15s ease;
            color: white;
            background: var(--primary);
        }
        button:hover, .btn:hover { background: var(--primary-hover); }
        button.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        button.secondary:hover { background: var(--card); }
        .pill {
            display: inline-block;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 999px;
            background: var(--border);
            color: var(--text);
        }
        .pill.aller { background: var(--aller); }
        .pill.retour { background: var(--retour); }
        .flash {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .flash.success { background: rgba(22, 163, 74, 0.15); color: #4ade80; border: 1px solid rgba(22, 163, 74, 0.3); }
        .flash.error { background: rgba(220, 38, 38, 0.15); color: #f87171; border: 1px solid rgba(220, 38, 38, 0.3); }
        .row { display: flex; gap: 8px; }
        .row > * { flex: 1; }
        .toggle-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .toggle-group input[type="radio"] { display: none; }
        .toggle-group label {
            text-align: center;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            color: var(--text);
            text-transform: none;
            letter-spacing: 0;
            font-size: 16px;
            font-weight: 500;
            margin: 0;
            background: var(--bg);
        }
        .toggle-group input[type="radio"]:checked + label {
            background: var(--primary);
            border-color: var(--primary);
        }
        details { margin-top: 16px; }
        details summary { cursor: pointer; color: var(--muted); padding: 8px 0; }
        .small { font-size: 14px; }
        a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    (function () {
        // Empêche le double-envoi et signale l'enregistrement en cours.
        document.addEventListener("submit", function (e) {
            if (e.defaultPrevented) return;
            var btn = e.target.querySelector('button[type="submit"], button:not([type])');
            if (!btn || btn.disabled) return;
            btn.dataset.prevLabel = btn.textContent;
            btn.disabled = true;
            btn.setAttribute("aria-busy", "true");
            btn.textContent = (btn.dataset.prevLabel || "").trim() + " …";
        });
        // Réactive les boutons si la page revient du cache (bouton Précédent).
        window.addEventListener("pageshow", function () {
            document.querySelectorAll('button[aria-busy="true"]').forEach(function (b) {
                b.disabled = false;
                b.removeAttribute("aria-busy");
                if (b.dataset.prevLabel) b.textContent = b.dataset.prevLabel;
            });
        });
    })();
    </script>
</body>
</html>
